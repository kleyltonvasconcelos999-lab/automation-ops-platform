version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: automation-ops-db
    environment:
      POSTGRES_USER: ${DB_USER:-automation}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-automation123}
      POSTGRES_DB: ${DB_NAME:-automation_ops}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-automation}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - automation-network

  redis:
    image: redis:7-alpine
    container_name: automation-ops-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - automation-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: automation-ops-backend
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      DATABASE_URL: postgresql://${DB_USER:-automation}:${DB_PASSWORD:-automation123}@postgres:5432/${DB_NAME:-automation_ops}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
      - ./backend/screenshots:/app/screenshots
    networks:
      - automation-network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: automation-ops-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:5000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
    networks:
      - automation-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  automation-network:
    driver: bridge
